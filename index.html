<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giám Sát Môi Trường</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
}
.app {
    width: 400px;
}
.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}
.value {
    font-size: 22px;
    font-weight: bold;
}
.bar-bg {
    background: #333;
    height: 10px;
    border-radius: 10px;
}
.bar {
    height: 10px;
    width: 0%;
    background: lime;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
🌡 Nhiệt độ: <span id="temp">--</span>
</div>

<div class="card">
💧 Độ ẩm: <span id="hum">--</span>
</div>

<div class="card">
🤖 AI: <span id="ai">--</span>
</div>

<div class="card">
⚠️ Anomaly: <span id="anom">--</span>

<div class="bar-bg">
<div id="bar" class="bar"></div>
</div>

<div id="statusText">--</div>

</div>

<div class="card">
<canvas id="chart1"></canvas>
</div>

<div class="card">
<canvas id="chart2"></canvas>
</div>

</div>

<script>

// ====== CONFIG (THAY CỦA BẠN) ======
var firebaseConfig = {
  apiKey: "AIzaSyCI8T41kd_xgC8GcujIyubfRqieNKvksYM",
  authDomain: "duandautien-2511.firebaseapp.com",
  databaseURL: "https://duandautien-2511-default-rtdb.firebaseio.com/",
  projectId: "duandautien-2511",
};

// ====== INIT ======
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ====== CHART ======
var chart1 = new Chart(document.getElementById("chart1"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Temperature",
            data: [],
            borderWidth: 2
        }]
    }
});

var chart2 = new Chart(document.getElementById("chart2"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Anomaly",
            data: [],
            borderWidth: 2
        }]
    }
});

// ====== UPDATE CHART ======
function updateChart(chart, value){
    var time = new Date().toLocaleTimeString();

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(value);

    if(chart.data.labels.length > 20){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

// ====== FIREBASE LISTENER ======
db.ref("sensor").on("value", function(snapshot){

    if(!snapshot.exists()){
        console.log("NO DATA");
        return;
    }

    var data = snapshot.val();

    // TEMP
    if(data.temperature != null){
        document.getElementById("temp").innerHTML = data.temperature;
        updateChart(chart1, data.temperature);
    }

    // HUM
    if(data.humidity != null){
        document.getElementById("hum").innerHTML = data.humidity;
    }

    // AI
    if(data.AI != null){
        document.getElementById("ai").innerHTML = data.AI;
    }

    // ANOMALY
    if(data.anomaly != null){

        var val = data.anomaly;
        document.getElementById("anom").innerHTML = val;

        var percent = Math.min(val * 100, 100);
        var bar = document.getElementById("bar");
        var status = document.getElementById("statusText");

        bar.style.width = percent + "%";

        if(val < 0.3){
            bar.style.background = "lime";
            status.innerHTML = "Ổn định";
        }
        else if(val < 0.6){
            bar.style.background = "orange";
            status.innerHTML = "Cảnh báo";
        }
        else{
            bar.style.background = "red";
            status.innerHTML = "NGUY HIỂM!";
        }

        updateChart(chart2, val);
    }

});

</script>

</body>
</html>
