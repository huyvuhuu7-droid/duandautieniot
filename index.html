<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Smart Home</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
    color: white;
}
.card {
    background: white;
    color: black;
    margin: 10px auto;
    padding: 15px;
    border-radius: 12px;
    width: 320px;
}
.alert {
    font-weight: bold;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>🏠 SMART HOME</h1>

<div class="card">🌡 Nhiệt độ: <span id="temp">--</span> °C</div>
<div class="card">💧 Độ ẩm: <span id="hum">--</span> %</div>
<div class="card">🤖 AI: <span id="ai">--</span></div>

<div class="card">
🚨 Cảnh báo: <span id="alertStatus" class="alert">--</span>
</div>

<div class="card">
📊 Biểu đồ nhiệt độ
<canvas id="chart"></canvas>
</div>

<script>

// ===== Firebase Config =====
var firebaseConfig = {
  apiKey: "AIzaSyCI8T41kd_xgC8GcujIyubfRqieNKvksYM",
  databaseURL: "https://duandautien-2511-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ===== SENSOR =====
db.ref("sensor/temperature").on("value", function(s){
    var val = s.val();
    document.getElementById("temp").innerHTML = val ?? "--";
    updateChart(val);
});

db.ref("sensor/humidity").on("value", function(s){
    document.getElementById("hum").innerHTML = s.val() ?? "--";
});

db.ref("sensor/AI").on("value", function(s){
    document.getElementById("ai").innerHTML = s.val() ?? "--";
});

// ===== ALERT (dựa vào anomaly) =====
db.ref("sensor/anomaly").on("value", function(s){
    var val = s.val();

    var el = document.getElementById("alertStatus");

    if(val != null && val > 0.4){
        el.innerHTML = "NGUY HIỂM!";
        el.style.color = "red";
    } else {
        el.innerHTML = "Bình thường";
        el.style.color = "green";
    }
});

// ===== CHART =====
var labels = [];
var data = [];

var chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: "Nhiệt độ",
            data: data,
            borderWidth: 2
        }]
    }
});

function updateChart(val){
    if(val == null) return;

    var time = new Date().toLocaleTimeString();

    labels.push(time);
    data.push(val);

    if(labels.length > 10){
        labels.shift();
        data.shift();
    }

    chart.update();
}

</script>

</body>
</html>
